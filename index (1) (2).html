<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>타이머 - 공부 집중 & 레벨업 앱</title>

<!-- 📌 SEO 설명 -->
<meta name="description" content="공부 타이머 앱 - 집중 시간 관리, 포모도로 학습법, 레벨 시스템, 공부 팁 제공으로 학습 효율을 높여주는 웹 앱입니다.">

<meta name="keywords" content="공부 타이머, 집중 타이머, 포모도로, 공부 앱, 시간 관리, 학습 도구">
<meta name="author" content="타이머 앱">

<!-- 📌 Open Graph (공유 미리보기) -->
<meta property="og:title" content="📚 타이머 - 공부 집중 앱">
<meta property="og:description" content="공부 시간 관리 + 레벨 시스템 + 공부 팁 제공 앱">
<meta property="og:type" content="website">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f6fa;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:25px;
  border-radius:20px;
  width:360px;
  text-align:center;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
  margin-bottom:10px;
}

#timer{
  font-size:55px;
  margin:15px 0;
  font-weight:bold;
}

input{
  width:80%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  text-align:center;
  font-size:16px;
}

button{
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.start{background:#4caf50;color:white;}
.stop{background:#f44336;color:white;}
.reset{background:#2196f3;color:white;}

.level{
  margin-top:10px;
  font-size:14px;
  color:#444;
}

.tip{
  margin-top:15px;
  font-size:13px;
  color:#666;
  line-height:1.4;
  background:#f0f0f0;
  padding:10px;
  border-radius:10px;
}

/* 📱 반응형 */
@media (max-width:600px){
  .box{width:90%;}
  #timer{font-size:40px;}
}
</style>
</head>

<body>

<div class="box">

<h1>⏱ 타이머</h1>

<input type="number" id="minutes" placeholder="분 입력">

<div id="timer">00:00</div>

<button class="start" onclick="startTimer()">시작</button>
<button class="stop" onclick="stopTimer()">정지</button>
<button class="reset" onclick="resetTimer()">리셋</button>

<div class="level">
⭐ 레벨: <span id="level">1</span> |
XP: <span id="xp">0</span>
</div>

<div class="tip">
📚 공부 팁<br><br>
- 하루 30분 꾸준함이 성적을 바꾼다<br>
- 이해 + 반복이 가장 중요하다<br>
- 25분 집중 + 5분 휴식 (포모도로)<br>
- 시험 전에는 문제풀이 중심으로 공부<br>
- 꾸준함이 합격을 만든다 💪
</div>

<!-- 📌 연락 정보 (신뢰도용) -->
<div style="margin-top:10px;font-size:11px;color:#888;">
문의: hongtaegeongaebalja@gmail.com
</div>

</div>

<script>

let time = 0;
let timer;
let running = false;

let xp = 0;
let level = 1;

function updateDisplay(){
  let min = Math.floor(time/60);
  let sec = time%60;

  document.getElementById("timer").innerText =
    String(min).padStart(2,'0') + ":" +
    String(sec).padStart(2,'0');
}

function startTimer(){
  if(running) return;

  if(time<=0){
    let m = document.getElementById("minutes").value;
    if(!m) return alert("시간 입력");
    time = m*60;
  }

  running = true;

  timer = setInterval(()=>{
    if(time>0){
      time--;
      updateDisplay();
    }else{
      clearInterval(timer);
      running=false;

      xp += 10;

      if(xp >= level*50){
        level++;
        xp = 0;
        alert("레벨 업! 🎉");
      }

      document.getElementById("xp").innerText = xp;
      document.getElementById("level").innerText = level;

      alert("공부 끝!");
    }
  },1000);
}

function stopTimer(){
  clearInterval(timer);
  running=false;
}

function resetTimer(){
  clearInterval(timer);
  running=false;
  time=0;
  updateDisplay();
}

</script>

</body>
</html>
